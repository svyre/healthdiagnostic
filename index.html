<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Трекер Здоровья</title>

<style>
:root{
--primary:#3498db;
--danger:#e74c3c;
--bg:#f4f7f6;
}

body{
font-family:Segoe UI,Roboto,sans-serif;
background:var(--bg);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
margin:0;
}

.card{
background:white;
width:90%;
max-width:500px;
padding:40px;
border-radius:24px;
box-shadow:0 15px 35px rgba(0,0,0,.1);
text-align:center;
}

.hidden{display:none;}

.btn{
background:var(--primary);
color:white;
border:none;
padding:15px;
border-radius:12px;
font-size:18px;
cursor:pointer;
width:100%;
}

.option-btn{
background:#fff;
border:2px solid #edf2f7;
padding:14px;
margin-bottom:10px;
border-radius:12px;
cursor:pointer;
width:100%;
text-align:left;
}

.progress-container{
width:100%;
height:8px;
background:#eee;
border-radius:10px;
margin-bottom:20px;
display:none;
}

.progress-bar{
height:100%;
width:0%;
background:var(--primary);
border-radius:10px;
}

.heart-rate{
width:50px;
height:50px;
margin:0 auto 20px;
background:var(--danger);
border-radius:50%;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(.95);}
70%{transform:scale(1);}
100%{transform:scale(.95);}
}
</style>
</head>

<body>

<div class="card">


<div id="welcome-screen">
<h1>Добро пожаловать 👋</h1>
<p>Введите имя перед началом диагностики</p>

<input id="username" placeholder="Ваше имя"
style="width:100%;padding:12px;margin:15px 0;border-radius:10px;border:1px solid #ddd;font-size:16px;">

<button class="btn" onclick="goToStart()">Продолжить</button>
</div>


<div id="start-screen" class="hidden">
<div class="heart-rate"></div>
<h1>Диагностика Здоровья</h1>
<p>Экспресс-тест из 10 вопросов</p>
<button class="btn" onclick="startQuiz()">Начать диагностику</button>
</div>

<div id="p-container" class="progress-container">
<div id="p-bar" class="progress-bar"></div>
</div>


<div id="quiz-screen" class="hidden">
<div id="question" style="font-size:20px;font-weight:bold;margin-bottom:20px;"></div>
<div id="options"></div>
</div>


<div id="result-screen" class="hidden">
<h2 id="res-title"></h2>
<p id="res-desc"></p>
<button class="btn" onclick="location.reload()">На главную</button>
</div>

</div>

<script>


const SHEET_API_URL="https://script.google.com/macros/s/AKfycby-VDxJulVufldbUzaP7CBTOwbkMuhk2QReSzHOT-hIcCv81AupY4GHtNpCR4E-EJvO/exec";


let userName="";
let current=0;
let score=0;

const questions=[
{q:"Как вы оцениваете бодрость?",a:[{t:"Полон сил",s:0},{t:"Устаю",s:1},{t:"Нет энергии",s:2}]},
{q:"Сколько часов вы спали?",a:[{t:"8-9",s:0},{t:"6-7",s:1},{t:"<6",s:2}]},
{q:"Как часто вы питаетесь?",a:[{t:"Регулярно",s:0},{t:"Иногда",s:1},{t:"Перекусы",s:2}]},
{q:"Часто ли у вас головные боли?",a:[{t:"Нет",s:0},{t:"Иногда",s:1},{t:"Часто",s:2}]},
{q:"Сколько часов в день вы сидите в гаджетах?",a:[{t:"<3ч",s:0},{t:"4-6ч",s:1},{t:"7+ч",s:2}]},
{q:"Занимаетесь ли вы спортом?",a:[{t:"Да",s:0},{t:"Редко",s:1},{t:"Нет",s:2}]},
{q:"Пьете ли вы воду??",a:[{t:"Пью, много",s:0},{t:"Пью, мало",s:1},{t:"Почти не пью",s:2}]},
{q:"Легко ли вы концентрируетесь?",a:[{t:"Легко",s:0},{t:"Иногда сложно",s:1},{t:"Тяжело",s:2}]},
{q:"Есть ли у вас боли в спине?",a:[{t:"Нет",s:0},{t:"Иногда",s:1},{t:"Постоянно",s:2}]},
{q:"Какой у вас уровень стресса?",a:[{t:"Низкий",s:0},{t:"Средний",s:1},{t:"Высокий",s:2}]}
];

function goToStart(){
userName=document.getElementById("username").value||"Аноним";
document.getElementById("welcome-screen").classList.add("hidden");
document.getElementById("start-screen").classList.remove("hidden");
}

function startQuiz(){
document.getElementById("start-screen").classList.add("hidden");
document.getElementById("quiz-screen").classList.remove("hidden");
document.getElementById("p-container").style.display="block";
showQuestion();
}

function showQuestion(){
const q=questions[current];
document.getElementById("question").innerText=q.q;

const opt=document.getElementById("options");
opt.innerHTML="";

q.a.forEach(ans=>{
const b=document.createElement("button");
b.className="option-btn";
b.innerText=ans.t;

b.onclick=()=>{
    score+=ans.s;
current++;
updateProgress();
current<questions.length?showQuestion():showResult();
};

opt.appendChild(b);
});
}

function updateProgress(){
document.getElementById("p-bar").style.width=
(current/questions.length*100)+"%";
}

function sendResultToSheets(resultText){
fetch(SHEET_API_URL,{
method:"POST",
body:JSON.stringify({
name:userName,
score:score,
result:resultText
})
});
}

function showResult(){

document.getElementById("quiz-screen").classList.add("hidden");
document.getElementById("p-container").classList.add("hidden");
document.getElementById("result-screen").classList.remove("hidden");

const title=document.getElementById("res-title");
const desc=document.getElementById("res-desc");

let resultText="";

if(score<=7){
resultText="Низкий риск";
title.innerText="Зеленая зона 🟢";
desc.innerText="Организм справляется с нагрузками.";
}
else if(score<=14){
resultText="Средний риск";
title.innerText="Желтая зона 🟡";
desc.innerText="Есть признаки утомления.";
}
else{
resultText="Высокий риск";
title.innerText="Красная зона 🔴";
desc.innerText="Рекомендуется отдых.";
}

sendResultToSheets(resultText);
}

</script>
</body>
</html>
